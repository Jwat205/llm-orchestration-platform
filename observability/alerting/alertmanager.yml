# Alertmanager Configuration for LLM Platform
# Advanced alerting with routing, inhibition, and multiple notification channels

# Global configuration
global:
  # The smarthost and SMTP sender used for mail notifications.
  smtp_smarthost: '${SMTP_HOST:smtp.gmail.com:587}'
  smtp_from: 'alerts@llm-platform.com'
  smtp_auth_username: '${SMTP_USERNAME}'
  smtp_auth_password: '${SMTP_PASSWORD}'
  smtp_require_tls: true

  # Slack webhook URL for notifications
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # PagerDuty integration key
  pagerduty_url: 'https://events.pagerduty.com/v2/enqueue'

  # Default values
  resolve_timeout: 5m

# Route tree for alert dispatching
route:
  # Root route - all alerts start here
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default-receiver'
  
  # Nested routes for specific alert types
  routes:
    # Critical alerts - immediate notification
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 0s
      group_interval: 30s
      repeat_interval: 5m
      continue: true
      
    # LLM-specific alerts
    - match:
        service: llm-inference
      receiver: 'llm-team'
      group_by: ['alertname', 'model_name']
      group_wait: 30s
      group_interval: 2m
      repeat_interval: 30m
      
    # Security alerts
    - match_re:
        alertname: '(HighAuthenticationFailures|UnauthorizedAccess|SecurityBreach)'
      receiver: 'security-team'
      group_wait: 0s
      group_interval: 30s
      repeat_interval: 15m
      
    # Infrastructure alerts
    - match_re:
        alertname: '(HighMemoryUsage|HighCPUUsage|DiskSpaceLow|ServiceDown)'
      receiver: 'infrastructure-team'
      group_by: ['alertname', 'instance']
      group_wait: 2m
      group_interval: 5m
      repeat_interval: 1h
      
    # GPU alerts
    - match_re:
        alertname: '(HighGPUUtilization|HighGPUMemoryUsage|HighGPUTemperature)'
      receiver: 'gpu-alerts'
      group_by: ['alertname', 'gpu']
      group_wait: 1m
      group_interval: 3m
      repeat_interval: 30m
      
    # Business metrics alerts
    - match_re:
        alertname: '(HighChurnRate|LowConversionRate|RevenueAlert)'
      receiver: 'business-team'
      group_wait: 5m
      group_interval: 30m
      repeat_interval: 6h
      
    # Database alerts
    - match:
        service: database
      receiver: 'database-team'
      group_by: ['alertname', 'database']
      group_wait: 1m
      group_interval: 5m
      repeat_interval: 1h

# Alert inhibition rules
inhibit_rules:
  # Inhibit warning alerts when critical alerts are firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']
    
  # Inhibit service alerts when node is down
  - source_match:
      alertname: 'NodeDown'
    target_match_re:
      alertname: '.*(High|Service).*'
    equal: ['instance']
    
  # Inhibit GPU alerts when service is down
  - source_match:
      alertname: 'ServiceDown'
    target_match_re:
      alertname: 'HighGPU.*'
    equal: ['instance']

# Receiver definitions
receivers:
  # Default receiver
  - name: 'default-receiver'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-general'
        title: 'LLM Platform Alert'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          {{ end }}
        send_resolved: true
        
  # Critical alerts - multiple channels
  - name: 'critical-alerts'
    # Slack notification
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#alerts-critical'
        title: '🚨 CRITICAL ALERT - LLM Platform'
        text: |
          <!here> CRITICAL ALERT DETECTED
          
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          *Instance:* {{ .Labels.instance }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        
    # Email notification
    email_configs:
      - to: 'oncall@llm-platform.com'
        from: 'alerts@llm-platform.com'
        subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }} - LLM Platform'
        html: |
          <h2>Critical Alert Detected</h2>
          {{ range .Alerts }}
          <div style="border: 2px solid red; padding: 10px; margin: 10px;">
            <h3>{{ .Annotations.summary }}</h3>
            <p><strong>Description:</strong> {{ .Annotations.description }}</p>
            <p><strong>Service:</strong> {{ .Labels.service }}</p>
            <p><strong>Instance:</strong> {{ .Labels.instance }}</p>
            <p><strong>Started:</strong> {{ .StartsAt.Format "2006-01-02 15:04:05" }}</p>
          </div>
          {{ end }}
        send_resolved: true
        
    # PagerDuty integration
    pagerduty_configs:
      - routing_key: '${PAGERDUTY_INTEGRATION_KEY}'
        description: 'Critical alert: {{ .GroupLabels.alertname }}'
        details:
          alert_count: '{{ len .Alerts }}'
          service: '{{ .GroupLabels.service }}'
          cluster: '{{ .GroupLabels.cluster }}'
        
  # LLM team notifications
  - name: 'llm-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#llm-alerts'
        title: '🤖 LLM Alert - {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Model:* {{ .Labels.model_name }}
          *Issue:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'warning'
        
    email_configs:
      - to: 'llm-team@llm-platform.com'
        subject: 'LLM Alert: {{ .GroupLabels.alertname }}'
        body: |
          LLM Platform Alert
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Model: {{ .Labels.model_name }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        
  # Security team notifications
  - name: 'security-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#security-alerts'
        title: '🔒 Security Alert - {{ .GroupLabels.alertname }}'
        text: |
          <!channel> SECURITY ALERT
          
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Time:* {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        
    email_configs:
      - to: 'security@llm-platform.com'
        subject: '🔒 SECURITY ALERT: {{ .GroupLabels.alertname }}'
        body: |
          SECURITY ALERT DETECTED
          
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Started: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
          
          Please investigate immediately.
        
  # Infrastructure team notifications
  - name: 'infrastructure-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#infra-alerts'
        title: '⚙️ Infrastructure Alert - {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Instance:* {{ .Labels.instance }}
          *Issue:* {{ .Annotations.summary }}
          *Value:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'warning'
        
  # GPU alerts
  - name: 'gpu-alerts'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#gpu-alerts'
        title: '🎮 GPU Alert - {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *GPU:* {{ .Labels.gpu }}
          *Issue:* {{ .Annotations.summary }}
          *Value:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'danger'
        
  # Business team notifications
  - name: 'business-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#business-alerts'
        title: '📊 Business Metric Alert - {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Metric:* {{ .Annotations.summary }}
          *Impact:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'warning'
        
    email_configs:
      - to: 'business@llm-platform.com'
        subject: 'Business Alert: {{ .GroupLabels.alertname }}'
        body: |
          Business Metric Alert
          
          {{ range .Alerts }}
          Metric: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}
        
  # Database team notifications
  - name: 'database-team'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL}'
        channel: '#database-alerts'
        title: '🗄️ Database Alert - {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Database:* {{ .Labels.database }}
          *Issue:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          {{ end }}
        send_resolved: true
        color: 'warning'
        
    email_configs:
      - to: 'dba@llm-platform.com'
        subject: 'Database Alert: {{ .GroupLabels.alertname }}'
        body: |
          Database Alert
          
          {{ range .Alerts }}
          Database: {{ .Labels.database }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Time: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

# Silence configuration
silences:
  gc_interval: 30m

# Template files
templates:
  - '/etc/alertmanager/templates/*.tmpl'