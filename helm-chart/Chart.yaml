apiVersion: v2
name: llm-platform
description: Enterprise-grade LLM API Platform with comprehensive features including streaming, function calling, embeddings, analytics, security, and more
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - llm
  - ai
  - api
  - machine-learning
  - enterprise
  - streaming
  - embeddings
  - analytics
  - security
home: https://github.com/your-org/llm-platform
sources:
  - https://github.com/your-org/llm-platform
maintainers:
  - name: LLM Platform Team
    email: team@llm-platform.com
dependencies:
  - name: postgresql
    version: "12.12.10"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "18.1.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: nginx
    version: "15.4.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: nginx.enabled
  - name: prometheus
    version: "25.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: "7.0.3"
    repository: "https://grafana.github.io/helm-charts"
    condition: monitoring.grafana.enabled
  - name: jaeger
    version: "2.0.0"
    repository: "https://jaegertracing.github.io/helm-charts"
    condition: observability.tracing.enabled
  - name: elasticsearch
    version: "19.13.0"
    repository: "https://helm.elastic.co"
    condition: logging.elasticsearch.enabled