# Production values for llm-platform
# This overrides the default values.yaml

# Production replica counts
replicaCount:
  django: 5
  fastapi: 10
  fastapiGpu: 3
  graphService: 3
  documentProcessor: 2
  trainingService: 1
  billingService: 2
  securityService: 2
  monitoringService: 1

# Production image settings
image:
  django:
    repository: llm-platform/django-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  fastapi:
    repository: llm-platform/fastapi-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  fastapiGpu:
    repository: llm-platform/fastapi-service
    tag: "v1.0.0-gpu"
    pullPolicy: IfNotPresent
  graphService:
    repository: llm-platform/graph-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  documentProcessor:
    repository: llm-platform/document-processor
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  trainingService:
    repository: llm-platform/training-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  billingService:
    repository: llm-platform/billing-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  securityService:
    repository: llm-platform/security-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent
  monitoringService:
    repository: llm-platform/monitoring-service
    tag: "v1.0.0"
    pullPolicy: IfNotPresent

# Production ingress with SSL
ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/rate-limit: "2000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: api.llm-platform.com
      paths:
        - path: /v1
          pathType: Prefix
          service: fastapi
        - path: /v2
          pathType: Prefix
          service: fastapi
        - path: /embeddings
          pathType: Prefix
          service: fastapi
        - path: /functions
          pathType: Prefix
          service: fastapi
    - host: admin.llm-platform.com
      paths:
        - path: /
          pathType: Prefix
          service: django
    - host: graph-api.llm-platform.com
      paths:
        - path: /
          pathType: Prefix
          service: graph-service
    - host: monitoring.llm-platform.com
      paths:
        - path: /
          pathType: Prefix
          service: monitoring-service
  tls:
    - secretName: llm-platform-api-tls
      hosts:
        - api.llm-platform.com
    - secretName: llm-platform-admin-tls
      hosts:
        - admin.llm-platform.com
    - secretName: llm-platform-graph-tls
      hosts:
        - graph-api.llm-platform.com
    - secretName: llm-platform-monitoring-tls
      hosts:
        - monitoring.llm-platform.com

# Production resource allocation
resources:
  django:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  fastapi:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 2000m
      memory: 4Gi
  fastapiGpu:
    limits:
      cpu: 8000m
      memory: 32Gi
      nvidia.com/gpu: 1
    requests:
      cpu: 4000m
      memory: 16Gi
      nvidia.com/gpu: 1
  graphService:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi
  documentProcessor:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  trainingService:
    limits:
      cpu: 8000m
      memory: 32Gi
      nvidia.com/gpu: 2
    requests:
      cpu: 4000m
      memory: 16Gi
      nvidia.com/gpu: 1
  billingService:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  securityService:
    limits:
      cpu: 1000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 1Gi
  monitoringService:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 1000m
      memory: 2Gi

# Production autoscaling
autoscaling:
  django:
    enabled: true
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  fastapi:
    enabled: true
    minReplicas: 10
    maxReplicas: 50
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  fastapiGpu:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85
  graphService:
    enabled: true
    minReplicas: 3
    maxReplicas: 15
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80

# Production persistent storage
persistence:
  enabled: true
  storageClass: "fast-ssd"
  postgres:
    size: 500Gi
  redis:
    size: 100Gi
  models:
    size: 2Ti
  embeddings:
    size: 1Ti
  documents:
    size: 500Gi
  logs:
    size: 200Gi
  backups:
    size: 1Ti

# Production configuration
config:
  django:
    debug: false
    allowedHosts: "admin.llm-platform.com,localhost"
  database:
    host: "postgres-service"
    port: "5432"
    name: "llm_platform_prod"
    user: "llm_user_prod"
    ssl: "require"
    maxConnections: "100"
  redis:
    host: "redis-service"
    port: "6379"
    ssl: "true"
    maxConnections: "1000"
  api:
    rateLimit: "10000"
    maxTokens: "8192"
    corsOrigins: "*"
    environment: "production"
  models:
    defaultModel: "llama-2-13b"
    cacheSize: "50GB"
    gpuMemoryFraction: "0.9"
  security:
    jwtExpiry: "3600"
    refreshTokenExpiry: "604800"
    passwordMinLength: "12"
    mfaEnabled: true
    auditLogging: true
  monitoring:
    metricsEnabled: true
    tracingEnabled: true
    logLevel: "INFO"
    retentionDays: "90"
  billing:
    stripeWebhookSecret: "whsec_production_key"
    defaultCurrency: "USD"
    
# Production external dependencies
postgresql:
  enabled: true
  auth:
    username: "llm_user_prod"
    database: "llm_platform_prod"
  primary:
    persistence:
      enabled: true
      size: 500Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 4000m
        memory: 8Gi
      requests:
        cpu: 2000m
        memory: 4Gi
  metrics:
    enabled: true

redis:
  enabled: true
  auth:
    enabled: true
  master:
    persistence:
      enabled: true
      size: 100Gi
      storageClass: "fast-ssd"
    resources:
      limits:
        cpu: 2000m
        memory: 4Gi
      requests:
        cpu: 1000m
        memory: 2Gi
  metrics:
    enabled: true

# Production monitoring and observability
monitoring:
  enabled: true
  prometheus:
    enabled: true
    retention: "90d"
    storage: "200Gi"
  grafana:
    enabled: true
    persistence:
      enabled: true
      size: "50Gi"
    plugins:
      - grafana-piechart-panel
      - grafana-worldmap-panel
  alerting:
    enabled: true
    slackWebhook: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
    pagerdutyKey: "YOUR_PAGERDUTY_KEY"

observability:
  logging:
    enabled: true
    elasticsearch:
      enabled: true
      replicas: 3
      storage: "200Gi"
    kibana:
      enabled: true
  tracing:
    enabled: true
    jaeger:
      enabled: true
      storage: "100Gi"

# Production security settings
security:
  podSecurityPolicy:
    enabled: true
  networkPolicies:
    enabled: true
  rbac:
    enabled: true
  secrets:
    encrypted: true
    rotationEnabled: true
  backup:
    enabled: true
    schedule: "0 1 * * *"
    retention: "30d"
    storage: "1Ti"

# Production node affinity and tolerations
nodeAffinity:
  django:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-type
              operator: In
              values: ["compute"]
  fastapi:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: node-type
              operator: In
              values: ["compute"]
  fastapiGpu:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: accelerator
              operator: In
              values: ["nvidia-tesla-v100", "nvidia-a100"]

# Production tolerations for GPU nodes
tolerations:
  gpu:
    - key: nvidia.com/gpu
      operator: Exists
      effect: NoSchedule
    - key: gpu-node
      operator: Equal
      value: "true"
      effect: NoSchedule