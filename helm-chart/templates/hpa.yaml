{{- if .Values.autoscaling.django.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "llm-platform.fullname" . }}-django
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: django
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "llm-platform.fullname" . }}-django
  minReplicas: {{ .Values.autoscaling.django.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.django.maxReplicas }}
  metrics:
    {{- if .Values.autoscaling.django.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.django.targetCPUUtilizationPercentage }}
    {{- end }}
    {{- if .Values.autoscaling.django.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.django.targetMemoryUtilizationPercentage }}
    {{- end }}
---
{{- end }}

