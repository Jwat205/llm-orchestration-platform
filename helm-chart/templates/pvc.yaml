{{- if .Values.persistence.enabled }}
# PostgreSQL PVC
{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "llm-platform.fullname" . }}-postgres
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.postgres.size }}
---
{{- end }}

