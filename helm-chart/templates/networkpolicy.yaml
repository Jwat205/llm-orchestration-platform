{{- if .Values.security.networkPolicies.enabled }}
# Default deny all policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-platform.fullname" . }}-default-deny
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Allow ingress traffic policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-platform.fullname" . }}-allow-ingress
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "llm-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Release.Namespace }}
    ports:
    - protocol: TCP
      port: 8000  # Django
    - protocol: TCP
      port: 8001  # FastAPI
    - protocol: TCP
      port: 8002  # Graph Service
    - protocol: TCP
      port: 8003  # Document Processor
    - protocol: TCP
      port: 8004  # Training Service
    - protocol: TCP
      port: 8005  # Billing Service
    - protocol: TCP
      port: 8006  # Security Service
    - protocol: TCP
      port: 8007  # Monitoring Service
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8001
---
# Allow database connections policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-platform.fullname" . }}-allow-database
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "llm-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: postgresql
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow HTTPS external connections
  - to: []
    ports:
    - protocol: TCP
      port: 443
  - to: []
    ports:
    - protocol: TCP
      port: 80
---
# Allow inter-service communication policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "llm-platform.fullname" . }}-allow-inter-service
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "llm-platform.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          {{- include "llm-platform.selectorLabels" . | nindent 10 }}
  egress:
  - to:
    - podSelector:
        matchLabels:
          {{- include "llm-platform.selectorLabels" . | nindent 10 }}
{{- end }}