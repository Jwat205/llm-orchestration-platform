# FastAPI GPU Deployment
{{- if .Values.replicaCount.fastapiGpu }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-platform.fullname" . }}-fastapi-gpu
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: fastapi-gpu
spec:
  replicas: {{ .Values.replicaCount.fastapiGpu }}
  selector:
    matchLabels:
      {{- include "llm-platform.selectorLabels" . | nindent 6 }}
      component: fastapi-gpu
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "llm-platform.selectorLabels" . | nindent 8 }}
        component: fastapi-gpu
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "llm-platform.serviceAccountName" . }}
      containers:
        - name: fastapi-gpu
          image: "{{ .Values.image.fastapiGpu.repository }}:{{ .Values.image.fastapiGpu.tag }}"
          imagePullPolicy: {{ .Values.image.fastapiGpu.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.fastapiGpu | nindent 12 }}
          envFrom:
            - configMapRef:
                name: {{ include "llm-platform.fullname" . }}-config
            - secretRef:
                name: {{ include "llm-platform.fullname" . }}-secrets
          volumeMounts:
            - name: model-cache
              mountPath: /app/models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "llm-platform.fullname" . }}-models
      {{- if .Values.gpu.enabled }}
      nodeSelector:
        {{- toYaml .Values.gpu.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.gpu.tolerations | nindent 8 }}
      {{- end }}
---
{{- end }}

