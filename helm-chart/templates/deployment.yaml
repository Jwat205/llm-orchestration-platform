{{- if .Values.replicaCount.django }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-platform.fullname" . }}-django
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: django
spec:
  replicas: {{ .Values.replicaCount.django }}
  selector:
    matchLabels:
      {{- include "llm-platform.selectorLabels" . | nindent 6 }}
      component: django
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "llm-platform.selectorLabels" . | nindent 8 }}
        component: django
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "llm-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: django
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.django.repository }}:{{ .Values.image.django.tag }}"
          imagePullPolicy: {{ .Values.image.django.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.django | nindent 12 }}
          env:
            - name: DATABASE_HOST
              value: {{ .Values.config.database.host }}
            - name: DATABASE_USER
              value: {{ .Values.config.database.user }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-platform.fullname" . }}-secrets
                  key: database-password
            - name: DJANGO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-platform.fullname" . }}-secrets
                  key: django-secret-key
            - name: REDIS_HOST
              value: {{ .Values.config.redis.host }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-platform.fullname" . }}-secrets
                  key: redis-password
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
---
{{- if .Values.replicaCount.fastapi }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "llm-platform.fullname" . }}-fastapi
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: fastapi
spec:
  replicas: {{ .Values.replicaCount.fastapi }}
  selector:
    matchLabels:
      {{- include "llm-platform.selectorLabels" . | nindent 6 }}
      component: fastapi
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "llm-platform.selectorLabels" . | nindent 8 }}
        component: fastapi
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "llm-platform.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: fastapi
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.fastapi.repository }}:{{ .Values.image.fastapi.tag }}"
          imagePullPolicy: {{ .Values.image.fastapi.pullPolicy }}
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources.fastapi | nindent 12 }}
          env:
            - name: DATABASE_HOST
              value: {{ .Values.config.database.host }}
            - name: DATABASE_USER
              value: {{ .Values.config.database.user }}
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-platform.fullname" . }}-secrets
                  key: database-password
            - name: REDIS_HOST
              value: {{ .Values.config.redis.host }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "llm-platform.fullname" . }}-secrets
                  key: redis-password
          volumeMounts:
            - name: model-cache
              mountPath: /app/models
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "llm-platform.fullname" . }}-models
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}