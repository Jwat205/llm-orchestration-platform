{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "llm-platform.fullname" . }}
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- range .Values.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            {{- if .pathType }}
            pathType: {{ .pathType }}
            {{- end }}
            backend:
              service:
                name: {{ include "llm-platform.fullname" $ }}-{{ .service }}
                port:
                  {{- if eq .service "django" }}
                  number: {{ $.Values.service.django.port }}
                  {{- else if eq .service "fastapi" }}
                  number: {{ $.Values.service.fastapi.port }}
                  {{- else if eq .service "graph-service" }}
                  number: {{ $.Values.service.graphService.port }}
                  {{- else if eq .service "monitoring-service" }}
                  number: {{ $.Values.service.monitoringService.port }}
                  {{- else }}
                  number: 80
                  {{- end }}
          {{- end }}
    {{- end }}
{{- end }}