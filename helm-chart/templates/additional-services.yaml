# FastAPI GPU Service
{{- if .Values.replicaCount.fastapiGpu }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-platform.fullname" . }}-fastapi-gpu
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: fastapi-gpu
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.fastapi.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-platform.selectorLabels" . | nindent 4 }}
    component: fastapi-gpu
---
{{- end }}

