apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-platform.fullname" . }}-django
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: django
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.django.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-platform.selectorLabels" . | nindent 4 }}
    component: django
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llm-platform.fullname" . }}-fastapi
  labels:
    {{- include "llm-platform.labels" . | nindent 4 }}
    component: fastapi
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.fastapi.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "llm-platform.selectorLabels" . | nindent 4 }}
    component: fastapi