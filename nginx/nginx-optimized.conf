events {
    worker_connections 2048;
    use epoll;
}

http {
    # Load balancing upstream - now with 5 FastAPI instances for 1,000+ RPS
    upstream fastapi_optimized {
        least_conn;
        server host.docker.internal:8001 max_fails=2 fail_timeout=10s;
        server host.docker.internal:8002 max_fails=2 fail_timeout=10s;
        server host.docker.internal:8004 max_fails=2 fail_timeout=10s;
        server host.docker.internal:8005 max_fails=2 fail_timeout=10s;
        server host.docker.internal:8006 max_fails=2 fail_timeout=10s;
        keepalive 32;
    }

    # Rate limiting for high performance
    limit_req_zone $binary_remote_addr zone=api_burst:20m rate=200r/s;
    limit_req_zone $binary_remote_addr zone=health_burst:10m rate=1000r/s;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 30;
    keepalive_requests 1000;

    # Buffer optimization for high throughput
    proxy_buffering on;
    proxy_buffer_size 8k;
    proxy_buffers 16 8k;
    proxy_busy_buffers_size 16k;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_types application/json text/plain application/javascript;

    server {
        listen 8090;
        server_name localhost;

        # Ultra-fast health check
        location /health {
            limit_req zone=health_burst burst=500 nodelay;
            proxy_pass http://fastapi_optimized;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 1s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
        }

        # Optimized API endpoints
        location /api/ {
            limit_req zone=api_burst burst=1000 nodelay;
            limit_conn conn_limit 100;

            proxy_pass http://fastapi_optimized;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Fast timeouts for <100ms target
            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 10s;
        }

        # All other requests
        location / {
            limit_req zone=api_burst burst=500 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://fastapi_optimized;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 2s;
            proxy_send_timeout 5s;
            proxy_read_timeout 10s;
        }
    }
}