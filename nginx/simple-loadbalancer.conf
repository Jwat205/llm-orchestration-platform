events {
    worker_connections 1024;
}

http {
    # Load balancing upstream with all available FastAPI instances
    upstream fastapi_cluster {
        least_conn;
        server host.docker.internal:8001;  # Original instance
        server host.docker.internal:8002;  # Metrics instance
        server host.docker.internal:8004;  # Optimized instance 1
        server host.docker.internal:8005;  # Optimized instance 2
        server host.docker.internal:8006;  # Optimized instance 3
    }

    # Basic rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    server {
        listen 8090;

        location / {
            limit_req zone=api burst=200 nodelay;

            proxy_pass http://fastapi_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Fast timeouts
            proxy_connect_timeout 2s;
            proxy_send_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}