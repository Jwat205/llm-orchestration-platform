groups:
  - name: llm_platform_alerts
    rules:
      # 99.5% Uptime SLA Alert
      - alert: ServiceDowntime
        expr: up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.instance }} is down"
          description: "Service {{ $labels.instance }} has been down for more than 30 seconds. This affects our 99.5% uptime SLA."

      # 1,000+ RPS Capacity Alert
      - alert: LowThroughput
        expr: rate(http_requests_total[5m]) < 500
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Throughput below 500 RPS"
          description: "Request rate is {{ $value }} RPS, below our 1,000+ RPS capacity target."

      # <100ms Latency Alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "95th percentile latency above 100ms"
          description: "95th percentile response time is {{ $value }}s, exceeding our <100ms target."

      # <50ms Cached Response Alert
      - alert: SlowCachedResponses
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{cached="true"}[5m])) > 0.05
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Cached responses above 50ms"
          description: "95th percentile cached response time is {{ $value }}s, exceeding our <50ms target."

      # 70%+ Cache Hit Rate Alert
      - alert: LowCacheHitRate
        expr: (rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))) < 0.7
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Cache hit rate below 70%"
          description: "Cache hit rate is {{ $value | humanizePercentage }}, below our 70% target."

      # High Error Rate Alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.005
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value | humanizePercentage }}, exceeding 0.5% threshold."

      # Memory Usage Alert
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}, exceeding 85% threshold."

      # CPU Usage Alert
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%, exceeding 80% threshold."

      # Monthly Request Volume Tracking
      - alert: MonthlyRequestVolumeAlert
        expr: increase(http_requests_total[30d]) < 1000000
        for: 5m
        labels:
          severity: info
        annotations:
          summary: "Monthly request volume tracking"
          description: "Monthly request volume is {{ $value }}, targeting 1M+ requests per month."

  - name: sla_monitoring
    rules:
      # 99.5% Availability SLA
      - record: sla:availability:5m
        expr: avg_over_time(up[5m])

      - record: sla:availability:1h
        expr: avg_over_time(sla:availability:5m[1h])

      - record: sla:availability:24h
        expr: avg_over_time(sla:availability:1h[24h])

      - record: sla:availability:30d
        expr: avg_over_time(sla:availability:24h[30d])

      # Request Success Rate
      - record: sla:success_rate:5m
        expr: 1 - (rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]))

      - record: sla:success_rate:1h
        expr: avg_over_time(sla:success_rate:5m[1h])

      # Performance SLA Tracking
      - record: sla:latency_p95:5m
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: sla:latency_p99:5m
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

      # Throughput SLA
      - record: sla:throughput:5m
        expr: rate(http_requests_total[5m])

      - record: sla:throughput:1h
        expr: avg_over_time(sla:throughput:5m[1h])

      # Cache Performance SLA
      - record: sla:cache_hit_rate:5m
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))

      - record: sla:cache_hit_rate:1h
        expr: avg_over_time(sla:cache_hit_rate:5m[1h])

      - record: sla:cache_hit_rate:24h
        expr: avg_over_time(sla:cache_hit_rate:1h[24h])