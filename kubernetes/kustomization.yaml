apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: llm-api-platform

resources:
  # Base infrastructure
  - base/namespace.yaml
  - base/configmap.yaml
  - base/secrets.yaml
  - base/pvc.yaml

  # Core services
  - services/django/deployment.yaml
  - services/django/service.yaml
  - services/django/hpa.yaml
  - services/django/ingress.yaml

  - services/fastapi/deployment.yaml
  - services/fastapi/service.yaml
  - services/fastapi/hpa.yaml
  - services/fastapi/gpu-deployment.yaml

  # Database services
  - services/database/postgres-deployment.yaml
  - services/database/postgres-service.yaml
  - services/database/redis-deployment.yaml

  # Monitoring stack
  - services/monitoring/prometheus.yaml
  - services/monitoring/grafana.yaml
  - services/monitoring/alertmanager.yaml

namespace: llm-api

commonLabels:
  app.kubernetes.io/name: llm-api
  app.kubernetes.io/component: platform
  app.kubernetes.io/version: v1.0.0

images:
  - name: llm-api/django
    newTag: latest
  - name: llm-api/fastapi
    newTag: latest

configMapGenerator:
  - name: app-config
    literals:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO

secretGenerator:
  - name: app-secrets
    literals:
      - DATABASE_PASSWORD=changeme
      - REDIS_PASSWORD=changeme
      - JWT_SECRET=changeme

replicas:
  - name: django-deployment
    count: 3
  - name: fastapi-deployment
    count: 3

patchesStrategicMerge:
  - patches/production-resources.yaml

patchesJson6902:
  - target:
      version: v1
      kind: Service
      name: django-service
    path: patches/service-annotations.yaml