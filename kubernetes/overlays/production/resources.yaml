apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-deployment
spec:
  template:
    spec:
      containers:
      - name: django
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: DATABASE_POOL_SIZE
          value: "20"
        - name: GUNICORN_WORKERS
          value: "4"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
spec:
  template:
    spec:
      containers:
      - name: fastapi
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        env:
        - name: ENVIRONMENT
          value: "production"
        - name: MAX_WORKERS
          value: "8"
        - name: MODEL_CACHE_SIZE
          value: "10GB"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-fastapi-deployment
spec:
  template:
    spec:
      containers:
      - name: fastapi-gpu
        resources:
          requests:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4000m"
            nvidia.com/gpu: "1"
      nodeSelector:
        accelerator: nvidia-tesla-v100
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"