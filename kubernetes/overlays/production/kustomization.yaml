apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: llm-api-prod

resources:
  - ../../base
  - ../../services

namePrefix: prod-

commonLabels:
  environment: production
  tier: prod

images:
  - name: llm-api/django
    newTag: v1.2.3
  - name: llm-api/fastapi
    newTag: v1.2.3

replicas:
  - name: django-deployment
    count: 5
  - name: fastapi-deployment
    count: 10

patchesStrategicMerge:
  - resources.yaml
  - ingress.yaml

configMapGenerator:
  - name: prod-config
    literals:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=WARNING
      - DATABASE_POOL_SIZE=20
      - REDIS_POOL_SIZE=50
      - MAX_WORKERS=8
      - RATE_LIMIT=10000

secretGenerator:
  - name: prod-secrets
    env: secrets.env