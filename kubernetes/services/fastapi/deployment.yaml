apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-deployment
  namespace: llm-platform
  labels:
    app: fastapi
    component: api
spec:
  replicas: 5
  selector:
    matchLabels:
      app: fastapi
  template:
    metadata:
      labels:
        app: fastapi
        component: api
    spec:
      containers:
      - name: fastapi
        image: llm-platform/fastapi-service:latest
        ports:
        - containerPort: 8001
        env:
        - name: DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: llm-platform-config
              key: DATABASE_HOST
        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: llm-platform-secrets
              key: DATABASE_USER
        - name: DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llm-platform-secrets
              key: DATABASE_PASSWORD
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: llm-platform-config
              key: REDIS_HOST
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: llm-platform-secrets
              key: REDIS_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: llm-platform-secrets
              key: JWT_SECRET
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-platform-secrets
              key: OPENAI_API_KEY
        - name: HUGGINGFACE_TOKEN
          valueFrom:
            secretKeyRef:
              name: model-secrets
              key: HUGGINGFACE_TOKEN
        - name: MODEL_CACHE_SIZE
          valueFrom:
            configMapKeyRef:
              name: llm-platform-config
              key: MODEL_CACHE_SIZE
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8001
          initialDelaySeconds: 30
          periodSeconds: 5
        volumeMounts:
        - name: model-cache
          mountPath: /app/models
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: model-cache-pvc
      imagePullSecrets:
      - name: registry-secret