apiVersion: v1
kind: Service
metadata:
  name: fastapi-service
  namespace: llm-platform
  labels:
    app: fastapi
spec:
  selector:
    app: fastapi
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: fastapi-gpu-service
  namespace: llm-platform
  labels:
    app: fastapi-gpu
spec:
  selector:
    app: fastapi-gpu
  ports:
  - port: 8001
    targetPort: 8001
    protocol: TCP
  type: ClusterIP