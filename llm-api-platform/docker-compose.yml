version: "3.9"
services:
  postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: your_user
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: your_db
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  django-service:
    build: ./django-service
    command: poetry run python manage.py runserver 0.0.0.0:8000 --settings=config.settings.development
    volumes:
      - ./django-service:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      - ENV=development

  fastapi-service:
    build: ./fastapi-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ./fastapi-service:/app
    ports:
      - "8001:8001"
    depends_on:
      - redis
    environment:
      - ENV=development

  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - django-service
      - fastapi-service

volumes:
  pgdata:
