version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: llm_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev_password
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - llm-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass dev_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - llm-network

  django:
    build:
      context: ./django-service
      dockerfile: Dockerfile.dev
    ports:
      - "8000:8000"
      - "5678:5678"  # Debug port
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:dev_password@postgres:5432/llm_api
      - DB_HOST=postgres
      - DB_NAME=llm_api
      - DB_USER=postgres
      - DB_PASSWORD=dev_password
      - DB_PORT=5432
      - REDIS_URL=redis://:dev_password@redis:6379/0
      - DJANGO_SETTINGS_MODULE=core.settings
      - DJANGO_SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0,django
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-service:/app
      - ./shared:/app/shared
      - django_static:/app/static
      - django_media:/app/media
    stdin_open: true
    tty: true
    networks:
      - llm-network
    restart: unless-stopped

  fastapi:
    build:
      context: ./fastapi_service
      dockerfile: Dockerfile.dev
    ports:
      - "8001:8001"
      - "5679:5679"  # Debug port
    environment:
      - DEBUG=True
      - ENV=development
      - DATABASE_URL=postgresql://postgres:dev_password@postgres:5432/llm_api
      - REDIS_URL=redis://:dev_password@redis:6379/0
      - DJANGO_SERVICE_URL=http://django:8000
      - DJANGO_AUTH_URL=http://django:8000/api/auth/internal/validate-token/
      - MODEL_CACHE_DIR=/app/models
      - HF_HOME=/app/huggingface_cache
      - TRANSFORMERS_CACHE=/app/transformers_cache
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DEFAULT_MODEL=gemma3:4b
      - API_KEY=dev-api-key
      - JWT_SECRET_KEY=dev-jwt-secret-change-in-production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./fastapi_service:/app
      - ./shared:/app/shared
      - model_cache:/app/models
      - huggingface_cache:/app/huggingface_cache
      - transformers_cache:/app/transformers_cache
    stdin_open: true
    tty: true
    networks:
      - llm-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8001
      - REACT_APP_WS_URL=ws://localhost:8001
      - REACT_APP_DJANGO_URL=http://localhost:8000
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    networks:
      - llm-network
    restart: unless-stopped
    depends_on:
      - django
      - fastapi

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/nginx.conf
      - django_static:/var/www/static
      - django_media:/var/www/media
    depends_on:
      - django
      - fastapi
      - frontend
    networks:
      - llm-network
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - llm-network

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    networks:
      - llm-network
    depends_on:
      - postgres

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  model_cache:
    driver: local
  django_static:
    driver: local
  django_media:
    driver: local
  huggingface_cache:
    driver: local
  transformers_cache:
    driver: local

networks:
  llm-network:
    driver: bridge