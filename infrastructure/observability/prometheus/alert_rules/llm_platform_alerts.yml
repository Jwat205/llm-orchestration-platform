# LLM Platform Alert Rules
# Critical alerts for LLM API platform monitoring

groups:
  - name: llm_platform_critical
    rules:
      # High error rate alerts
      - alert: HighErrorRate
        expr: |
          (
            rate(http_requests_total{status=~"5.."}[5m]) /
            rate(http_requests_total[5m])
          ) * 100 > 5
        for: 2m
        labels:
          severity: critical
          service: "{{ $labels.service }}"
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "{{ $labels.service }} has error rate of {{ $value }}% for more than 2 minutes"

      # High response time alerts  
      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 2
        for: 3m
        labels:
          severity: warning
          service: "{{ $labels.service }}"
        annotations:
          summary: "High response time on {{ $labels.service }}"
          description: "95th percentile response time is {{ $value }}s on {{ $labels.service }}"

      # LLM inference performance alerts
      - alert: SlowLLMInference
        expr: histogram_quantile(0.90, rate(llm_inference_duration_seconds_bucket[5m])) > 10
        for: 1m
        labels:
          severity: warning
          model: "{{ $labels.model_name }}"
        annotations:
          summary: "Slow LLM inference for {{ $labels.model_name }}"
          description: "90th percentile inference time is {{ $value }}s for model {{ $labels.model_name }}"

      - alert: LLMInferenceFailures
        expr: rate(llm_inference_failures_total[5m]) > 0.1
        for: 1m
        labels:
          severity: critical
          model: "{{ $labels.model_name }}"
        annotations:
          summary: "LLM inference failures for {{ $labels.model_name }}"
          description: "{{ $value }} inference failures per second for model {{ $labels.model_name }}"

  - name: system_resources
    rules:
      # Memory usage alerts
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: CriticalMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      # CPU usage alerts
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      # Disk space alerts
      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"}) * 100 < 20
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk space is {{ $value }}% full on {{ $labels.instance }}:{{ $labels.mountpoint }}"

      - alert: CriticalDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"}) * 100 < 10
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk space is {{ $value }}% full on {{ $labels.instance }}:{{ $labels.mountpoint }}"

  - name: gpu_monitoring
    rules:
      # GPU utilization alerts
      - alert: HighGPUUtilization
        expr: nvidia_gpu_utilization > 95
        for: 10m
        labels:
          severity: warning
          gpu: "{{ $labels.gpu }}"
        annotations:
          summary: "High GPU utilization on GPU {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} utilization is {{ $value }}%"

      # GPU memory alerts
      - alert: HighGPUMemoryUsage
        expr: (nvidia_gpu_memory_used_bytes / nvidia_gpu_memory_total_bytes) * 100 > 90
        for: 5m
        labels:
          severity: warning
          gpu: "{{ $labels.gpu }}"
        annotations:
          summary: "High GPU memory usage on GPU {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} memory usage is {{ $value }}%"

      # GPU temperature alerts
      - alert: HighGPUTemperature
        expr: nvidia_gpu_temperature_celsius > 85
        for: 3m
        labels:
          severity: critical
          gpu: "{{ $labels.gpu }}"
        annotations:
          summary: "High GPU temperature on GPU {{ $labels.gpu }}"
          description: "GPU {{ $labels.gpu }} temperature is {{ $value }}°C"

  - name: application_health
    rules:
      # Service availability
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.job }} on {{ $labels.instance }} has been down for more than 1 minute"

      # Database connection alerts
      - alert: DatabaseConnectionFailures
        expr: rate(database_connection_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection failures"
          description: "Database connection failure rate is {{ $value }} per second"

      # Redis connection alerts
      - alert: RedisConnectionFailures
        expr: redis_connected_clients / redis_config_maxclients * 100 > 90
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High Redis connection usage"
          description: "Redis connection usage is {{ $value }}%"

      # Queue size alerts
      - alert: HighQueueSize
        expr: task_queue_size > 1000
        for: 5m
        labels:
          severity: warning
          queue: "{{ $labels.queue_name }}"
        annotations:
          summary: "High queue size for {{ $labels.queue_name }}"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks"

  - name: security_alerts
    rules:
      # Authentication failure alerts
      - alert: HighAuthenticationFailures
        expr: rate(authentication_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High authentication failure rate"
          description: "{{ $value }} authentication failures per second"

      # Suspicious API usage
      - alert: UnusualAPIUsage
        expr: rate(http_requests_total[5m]) > 100
        for: 10m
        labels:
          severity: warning
          endpoint: "{{ $labels.endpoint }}"
        annotations:
          summary: "Unusual API usage pattern"
          description: "{{ $value }} requests per second to {{ $labels.endpoint }}"

      # Rate limiting alerts
      - alert: HighRateLimitHits
        expr: rate(rate_limit_exceeded_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High rate limit violations"
          description: "{{ $value }} rate limit violations per second"