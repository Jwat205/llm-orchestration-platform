# Logstash Configuration for LLM Platform
# Log processing and enrichment pipeline

input {
  # Beats input for structured logs
  beats {
    port => 5044
    host => "0.0.0.0"
  }
  
  # HTTP input for direct log shipping
  http {
    port => 8080
    host => "0.0.0.0"
    codec => json
    additional_codecs => {
      "application/json" => "json"
    }
  }
  
  # Syslog input for system logs
  syslog {
    port => 5514
    host => "0.0.0.0"
  }
  
  # TCP input for application logs
  tcp {
    port => 5000
    host => "0.0.0.0"
    codec => json_lines
  }
  
  # File input for log files
  file {
    path => "/var/log/llm-platform/*.log"
    start_position => "beginning"
    codec => multiline {
      pattern => "^\d{4}-\d{2}-\d{2}"
      negate => true
      what => "previous"
    }
  }
}

filter {
  # Parse timestamp
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Add metadata
  mutate {
    add_field => {
      "[@metadata][pipeline]" => "llm-platform"
      "[@metadata][version]" => "1.0.0"
    }
  }
  
  # Parse different log types
  if [service] == "fastapi" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:log_timestamp} - %{WORD:log_level} - %{DATA:logger_name} - %{GREEDYDATA:log_message}"
      }
    }
    
    # Parse API request logs
    if [log_message] =~ /^(GET|POST|PUT|DELETE|PATCH)/ {
      grok {
        match => {
          "log_message" => "%{WORD:http_method} %{URIPATH:endpoint}.*?- %{NUMBER:response_time:float}ms - %{NUMBER:status_code:int}"
        }
      }
      
      mutate {
        add_tag => ["api_request"]
        add_field => {
          "log_type" => "api_request"
          "response_time_ms" => "%{response_time}"
        }
      }
    }
    
    # Parse LLM inference logs
    if [log_message] =~ /Model Performance/ {
      grok {
        match => {
          "log_message" => "Model Performance: %{DATA:model_name} - %{NUMBER:tokens_per_second:float} tokens/s - %{NUMBER:inference_time:float}s"
        }
      }
      
      mutate {
        add_tag => ["llm_inference"]
        add_field => {
          "log_type" => "llm_inference"
        }
      }
    }
  }
  
  if [service] == "django" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:log_timestamp}\] %{WORD:log_level} %{DATA:logger_name}: %{GREEDYDATA:log_message}"
      }
    }
    
    # Parse Django request logs
    if [log_message] =~ /^"(GET|POST|PUT|DELETE|PATCH)/ {
      grok {
        match => {
          "log_message" => "\"%{WORD:http_method} %{URIPATH:endpoint}.*?\" %{NUMBER:status_code:int} %{NUMBER:response_size:int} \"%{DATA:user_agent}\""
        }
      }
      
      mutate {
        add_tag => ["django_request"]
        add_field => {
          "log_type" => "django_request"
        }
      }
    }
  }
  
  # Parse security logs
  if [service] == "security" {
    mutate {
      add_tag => ["security"]
      add_field => {
        "log_type" => "security"
      }
    }
    
    # Parse authentication attempts
    if [log_message] =~ /(login|authentication|failed|success)/ {
      mutate {
        add_tag => ["authentication"]
        add_field => {
          "event_type" => "authentication"
        }
      }
    }
    
    # Parse authorization events
    if [log_message] =~ /(unauthorized|forbidden|access denied)/ {
      mutate {
        add_tag => ["authorization_failure"]
        add_field => {
          "event_type" => "authorization_failure"
          "severity" => "high"
        }
      }
    }
  }
  
  # Parse error logs
  if [log_level] in ["ERROR", "CRITICAL", "FATAL"] {
    mutate {
      add_tag => ["error"]
      add_field => {
        "is_error" => "true"
        "alert_priority" => "high"
      }
    }
    
    # Extract exception information
    if [log_message] =~ /Traceback/ {
      mutate {
        add_tag => ["exception"]
        add_field => {
          "has_traceback" => "true"
        }
      }
    }
  }
  
  # Performance metrics extraction
  if [response_time] {
    if [response_time] > 5000 {
      mutate {
        add_tag => ["slow_request"]
        add_field => {
          "performance_issue" => "slow_response"
        }
      }
    }
  }
  
  # Add geographical information if IP is present
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
  
  # Parse user agent
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }
  
  # Add environment information
  mutate {
    add_field => {
      "environment" => "${ENVIRONMENT:development}"
      "cluster" => "${CLUSTER_NAME:local}"
      "region" => "${AWS_REGION:us-east-1}"
    }
  }
  
  # Convert numeric fields
  if [tokens_per_second] {
    mutate {
      convert => {
        "tokens_per_second" => "float"
      }
    }
  }
  
  if [inference_time] {
    mutate {
      convert => {
        "inference_time" => "float"
      }
    }
  }
  
  # Remove unnecessary fields
  mutate {
    remove_field => [
      "host",
      "agent",
      "ecs",
      "input",
      "log"
    ]
  }
}

output {
  # Main Elasticsearch output
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "llm-platform-logs-%{+YYYY.MM.dd}"
    template_name => "llm-platform"
    template => "/usr/share/logstash/templates/llm-platform-template.json"
    template_overwrite => true
    
    # Performance optimizations
    flush_size => 1000
    idle_flush_time => 1
  }
  
  # Separate index for error logs
  if "error" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "llm-platform-errors-%{+YYYY.MM.dd}"
    }
  }
  
  # Separate index for security logs
  if "security" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "llm-platform-security-%{+YYYY.MM.dd}"
    }
  }
  
  # Separate index for performance metrics
  if "api_request" in [tags] or "llm_inference" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "llm-platform-performance-%{+YYYY.MM.dd}"
    }
  }
  
  # Dead letter queue for failed documents
  if "_grokparsefailure" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      index => "llm-platform-failed-%{+YYYY.MM.dd}"
    }
  }
  
  # Debug output (remove in production)
  if [environment] == "development" {
    stdout {
      codec => rubydebug {
        metadata => true
      }
    }
  }
}