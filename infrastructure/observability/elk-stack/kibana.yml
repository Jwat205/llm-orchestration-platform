# Kibana Configuration for LLM Platform
# Log visualization and dashboard interface

version: '3.8'

services:
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: llm-kibana
    environment:
      - SERVERNAME=llm-kibana
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - ELASTICSEARCH_USERNAME=kibana_system
      - ELASTICSEARCH_PASSWORD=${KIBANA_PASSWORD:-kibana_password}
      - XPACK_SECURITY_ENABLED=true
      - XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY=${KIBANA_ENCRYPTION_KEY:-a7a6311933d3503b89bc2dbc496edc5c}
      - XPACK_REPORTING_ENCRYPTIONKEY=${KIBANA_REPORTING_KEY:-a7a6311933d3503b89bc2dbc496edc5c}
      - XPACK_SECURITY_ENCRYPTIONKEY=${KIBANA_SECURITY_KEY:-a7a6311933d3503b89bc2dbc496edc5c}
      - SERVER_PUBLICBASEURL=https://kibana.llm-platform.com
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=5601
      # Performance optimizations
      - NODE_OPTIONS="--max-old-space-size=4096"
      - LOGGING_ROOT_LEVEL=warn
    volumes:
      - kibana_data:/usr/share/kibana/data
      - ./kibana/config/kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - ./kibana/dashboards:/usr/share/kibana/dashboards:ro
    ports:
      - "5601:5601"
    networks:
      - llm-observability
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    mem_limit: 2g
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  kibana_data:
    driver: local

networks:
  llm-observability:
    external: true

# Kibana configuration file content
---
# This would be mounted as kibana.yml
server.name: llm-kibana
server.host: "0.0.0.0"
server.port: 5601
server.publicBaseUrl: "https://kibana.llm-platform.com"

elasticsearch.hosts: ["http://elasticsearch:9200"]
elasticsearch.username: "kibana_system"
elasticsearch.password: "${KIBANA_PASSWORD}"

monitoring.ui.container.elasticsearch.enabled: true
monitoring.ui.container.logstash.enabled: true

xpack.security.enabled: true
xpack.security.encryptionKey: "${KIBANA_SECURITY_KEY}"
xpack.encryptedSavedObjects.encryptionKey: "${KIBANA_ENCRYPTION_KEY}"
xpack.reporting.encryptionKey: "${KIBANA_REPORTING_KEY}"

xpack.reporting.capture.browser.chromium.disableSandbox: true
xpack.reporting.roles.enabled: false

# Custom index patterns
xpack.spaces.enabled: true
xpack.spaces.maxSpaces: 100

# Dashboard and visualization settings
xpack.canvas.enabled: true
xpack.graph.enabled: true
xpack.ml.enabled: true

# Alerting configuration
xpack.actions.enabled: true
xpack.alerting.enabled: true
xpack.task_manager.enabled: true

# Custom logging configuration
logging.appenders:
  file:
    type: file
    fileName: /usr/share/kibana/data/kibana.log
    layout:
      type: json
      
logging.loggers:
  - name: http.server.response
    level: warn
  - name: plugins.security
    level: info
  - name: elasticsearch.query
    level: warn

# Performance tuning
server.maxPayloadBytes: 1048576
server.socketTimeout: 120000
elasticsearch.requestTimeout: 30000
elasticsearch.shardTimeout: 30000

# Custom index patterns for LLM Platform
kibana.index: ".kibana-llm-platform"
kibana.defaultAppId: "dashboard"

# Index lifecycle management
xpack.ilm.enabled: true

# Custom branding (optional)
server.customResponseHeaders:
  X-Frame-Options: "SAMEORIGIN"
  X-Content-Type-Options: "nosniff"

# Memory circuit breaker
ops.cGroupOverrides.cpuPath: "/sys/fs/cgroup/cpu"
ops.cGroupOverrides.cpuAcctPath: "/sys/fs/cgroup/cpuacct"